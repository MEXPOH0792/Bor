<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Отслеживание водителей — BOR</title>
    <meta name="theme-color" content="#223a5e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="BOR" />
    <link rel="manifest" href="./site.webmanifest" />
    <link rel="icon" type="image/png" sizes="16x16" href="./icon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell page-shell-wide">
      <header class="topbar topbar-main">
        <div>
          <h1>Отслеживание водителей</h1>
          <p class="hero-subtitle">Перевозки из России в Шайдон</p>
        </div>
        <nav class="topbar-links" aria-label="Быстрые ссылки">
          <a href="tel:+79990000000">Поддержка</a>
          <a href="./driver.html">Войти по ссылке</a>
        </nav>
      </header>

      <main class="page-main page-main-compact">
        <section id="connectionBanner" class="panel panel-warning hidden" role="status"></section>
        <section id="cacheBanner" class="panel panel-warning hidden" role="status"></section>
        <section id="errorBanner" class="panel panel-error hidden" role="alert"></section>

        <section class="summary-strip-wrap">
          <div id="summaryGrid" class="summary-strip" aria-live="polite">
            <article class="summary-tile summary-fresh">
              <span class="summary-kicker">Сейчас собирает:</span>
              <strong id="freshCount" class="summary-inline-value">0</strong>
            </article>
            <article class="summary-tile summary-route">
              <span class="summary-kicker">В пути:</span>
              <strong id="warningCount" class="summary-inline-value">0</strong>
            </article>
            <article class="summary-tile summary-warning">
              <span class="summary-kicker">Нужно проверить:</span>
              <strong id="staleCount" class="summary-inline-value">0</strong>
            </article>
            <article class="summary-tile summary-danger">
              <span class="summary-kicker">В Шайдоне:</span>
              <strong id="shaidonCount" class="summary-inline-value">0</strong>
            </article>
          </div>
        </section>

        <section class="toolbar-row">
          <div id="filterBar" class="filter-bar" aria-label="Фильтры водителей">
            <button class="filter-button is-active" type="button" data-filter="all">Все</button>
            <button class="filter-button" type="button" data-filter="attention">Нужна проверка</button>
            <button class="filter-button" type="button" data-filter="shaidon">В Шайдоне</button>
            <button class="filter-button" type="button" data-filter="collecting">Собирают в России</button>
          </div>
          <div class="toolbar-side">
            <p id="syncInfo" class="muted sync-info">Ожидание загрузки...</p>
            <button id="refreshButton" class="button button-primary button-small" type="button">
              Обновить
            </button>
          </div>
        </section>

        <p id="filterInfo" class="filter-info muted">Показаны все водители.</p>

        <section id="emptyState" class="panel panel-tight hidden" role="status">
          <p id="emptyStateText" class="muted">По этому фильтру водителей нет.</p>
        </section>

        <section id="driversGrid" class="drivers-list" aria-live="polite"></section>
      </main>
    </div>

    <template id="driverCardTemplate">
      <article class="driver-card">
        <div class="driver-card-head">
          <p class="driver-number"></p>
        </div>

        <div class="driver-card-body">
          <div class="driver-identity">
            <div class="driver-avatar" aria-hidden="true"></div>
            <div class="driver-identity-copy">
              <h3 class="driver-name"></h3>
              <p class="driver-phone-row"><a class="driver-phone-link" href="#"></a></p>
            </div>
          </div>

          <div class="driver-status-slot">
            <span class="status-chip"></span>
            <span class="freshness-pill"></span>
          </div>

          <div class="driver-action-slot">
            <a class="button button-secondary driver-call-button" href="#">Позвонить</a>
          </div>
        </div>

        <div class="driver-card-foot">
          <div class="driver-location-line">
            <span class="meta-icon">●</span>
            <p class="driver-location-main"></p>
          </div>
          <div class="driver-time-line">
            <span class="driver-updated-main"></span>
            <span class="driver-age-note"></span>
          </div>
        </div>

        <p class="driver-alert hidden"></p>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
