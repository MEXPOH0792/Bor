<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Driver Preview</title><style>:root {
  --bg: #f3f6fb;
  --surface: #ffffff;
  --surface-soft: #f8fbff;
  --line: #d9e2ee;
  --line-strong: #c8d4e4;
  --text: #1f3454;
  --muted: #65738a;
  --primary: #2e5b9a;
  --primary-dark: #223a5e;
  --primary-soft: #eaf1fb;
  --green: #22a469;
  --green-soft: #e8f8f0;
  --amber: #e2a727;
  --amber-soft: #fff4d6;
  --red: #d54640;
  --red-soft: #fff0ef;
  --shadow-soft: 0 10px 24px rgba(31, 52, 84, 0.08);
  --radius: 20px;
  --radius-sm: 14px;
  --max-width: 980px;
  --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* { box-sizing: border-box; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: var(--font);
  color: var(--text);
  background: linear-gradient(180deg, #f8fbff 0%, #f1f5fa 100%);
}

a { color: inherit; text-decoration: none; }
button, input, select { font: inherit; }
h1, h2, h3, p, dl, dt, dd { margin: 0; }

.page-shell {
  width: min(var(--max-width), calc(100% - 28px));
  margin: 0 auto;
  padding: 22px 0 36px;
}
.page-shell-wide { width: min(var(--max-width), calc(100% - 28px)); }
.page-shell-narrow { width: min(920px, calc(100% - 28px)); }
.page-main { display: grid; gap: 14px; }
.page-main-compact { gap: 12px; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 28px 26px 22px;
  border: 1px solid var(--line);
  border-radius: 22px;
  background: var(--surface);
  box-shadow: var(--shadow-soft);
}
.topbar-main { margin-bottom: 16px; }
.topbar h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  line-height: 1.02;
  letter-spacing: -0.05em;
  color: var(--primary-dark);
}
.hero-subtitle {
  margin-top: 10px;
  color: var(--muted);
  font-size: 1.02rem;
  line-height: 1.5;
}
.topbar-links {
  display: flex;
  align-items: center;
  gap: 18px;
  flex-wrap: wrap;
}
.topbar-links a {
  color: var(--primary-dark);
  font-weight: 700;
  padding-bottom: 6px;
  border-bottom: 2px solid rgba(34, 58, 94, 0.12);
}

.panel {
  padding: 16px 18px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow-soft);
}
.panel-tight { padding: 18px; }
.panel-warning {
  background: #fff8ea;
  border-color: #f0ddae;
  color: #8d6720;
}
.panel-error {
  background: #fff1f0;
  border-color: #f1c5c2;
  color: #9a312d;
}
.hidden { display: none !important; }
.muted { color: var(--muted); }
.section-title { font-size: 1.15rem; margin-bottom: 14px; }
.panel-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
}

.summary-strip-wrap { margin-top: 2px; }
.summary-strip {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}
.summary-tile {
  padding: 16px 18px;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--surface);
  box-shadow: var(--shadow-soft);
  display: grid;
  gap: 8px;
}
.summary-kicker {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 0.95rem;
  font-weight: 700;
}
.summary-kicker::before {
  content: "";
  width: 14px;
  height: 14px;
  border-radius: 999px;
  display: inline-block;
}
.summary-inline-value {
  font-size: 1.6rem;
  line-height: 1.1;
  color: var(--primary-dark);
}
.summary-fresh .summary-kicker { color: var(--green); }
.summary-fresh .summary-kicker::before { background: var(--green); }
.summary-route .summary-kicker { color: var(--primary); }
.summary-route .summary-kicker::before { background: var(--primary); }
.summary-warning .summary-kicker { color: var(--amber); }
.summary-warning .summary-kicker::before { background: var(--amber); }
.summary-danger .summary-kicker { color: var(--red); }
.summary-danger .summary-kicker::before { background: var(--red); }

.toolbar-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-top: 2px;
}
.toolbar-side {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
}
.sync-info { font-size: 0.95rem; }
.filter-bar { display: flex; flex-wrap: wrap; gap: 10px; }
.filter-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 42px;
  padding: 0 14px;
  border: 1px solid var(--line-strong);
  border-radius: 12px;
  background: #fff;
  color: var(--primary-dark);
  cursor: pointer;
  transition: background-color .15s ease, color .15s ease, border-color .15s ease;
}
.filter-button.is-active {
  border-color: var(--primary);
  background: var(--primary-soft);
  color: var(--primary-dark);
  font-weight: 700;
}
.filter-info { margin: 2px 2px 4px; font-size: .94rem; }

.drivers-list { display: grid; gap: 14px; }
.driver-card {
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--surface);
  box-shadow: var(--shadow-soft);
  overflow: hidden;
}
.driver-card-head {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--line);
}
.driver-number {
  font-size: 1rem;
  font-weight: 800;
  color: var(--primary-dark);
}
.driver-card-body {
  display: grid;
  grid-template-columns: minmax(0, 1.3fr) auto auto;
  align-items: center;
  gap: 18px;
  padding: 18px 20px;
}
.driver-identity {
  display: flex;
  align-items: center;
  gap: 14px;
  min-width: 0;
}
.driver-avatar {
  width: 58px;
  height: 58px;
  border-radius: 999px;
  background: linear-gradient(180deg, #e8eef8 0%, #d6e0ef 100%);
  border: 1px solid #cfd9e7;
  color: var(--primary-dark);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1.05rem;
  flex: 0 0 auto;
}
.driver-identity-copy { min-width: 0; }
.driver-name {
  font-size: clamp(1.4rem, 2.4vw, 1.9rem);
  line-height: 1.1;
  color: var(--primary-dark);
}
.driver-phone-row { margin-top: 8px; }
.driver-phone-link {
  font-size: 1rem;
  color: var(--text);
  text-decoration: none;
}
.driver-phone-link.is-disabled {
  color: var(--muted);
  pointer-events: none;
}
.driver-status-slot {
  display: grid;
  justify-items: center;
  gap: 8px;
}
.status-chip,
.freshness-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 44px;
  padding: 0 18px;
  border-radius: 12px;
  font-weight: 800;
  text-align: center;
  white-space: nowrap;
}
.status-chip {
  background: #edf3fb;
  color: var(--primary);
}
.freshness-pill {
  min-height: 30px;
  font-size: 0.86rem;
  padding: 0 12px;
  background: var(--green-soft);
  color: var(--green);
}
.status-chip[data-freshness="warning"],
.freshness-pill[data-freshness="warning"] {
  background: var(--amber-soft);
  color: #a16f08;
}
.status-chip[data-freshness="stale"],
.status-chip[data-freshness="unknown"],
.freshness-pill[data-freshness="stale"],
.freshness-pill[data-freshness="unknown"] {
  background: var(--red-soft);
  color: #b03731;
}
.driver-action-slot { justify-self: end; }
.driver-call-button {
  min-width: 168px;
  min-height: 54px;
  font-weight: 800;
}
.driver-card-foot {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-top: 1px solid var(--line);
}
.driver-location-line,
.driver-time-line {
  display: flex;
  align-items: center;
  gap: 10px;
}
.driver-time-line { justify-content: flex-end; flex-wrap: wrap; gap: 8px; }
.meta-icon {
  color: var(--primary);
  font-size: 1.1rem;
  line-height: 1;
}
.driver-location-main,
.driver-updated-main,
.driver-age-note {
  font-size: 1rem;
  line-height: 1.35;
}
.driver-updated-main,
.driver-age-note { color: var(--text); }
.driver-alert {
  margin: 0 20px 18px;
  padding: 12px 14px;
  border-radius: 12px;
  background: #f1f6fd;
  color: var(--primary-dark);
  font-size: 0.94rem;
  font-weight: 700;
}
.driver-card[data-freshness="warning"] .driver-alert { background: var(--amber-soft); color: #91660c; }
.driver-card[data-freshness="stale"] .driver-alert,
.driver-card[data-freshness="unknown"] .driver-alert { background: var(--red-soft); color: #a13631; }

.driver-snapshot {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}
.driver-snapshot div {
  padding: 16px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: var(--surface-soft);
  display: grid;
  gap: 6px;
}
dt { color: var(--muted); font-size: .9rem; }
dd { font-size: 1rem; font-weight: 700; }

.panel-form { padding: 18px 20px; }
.driver-form { display: grid; gap: 12px; }
.driver-form-compact .form-row {
  display: grid;
  grid-template-columns: 150px minmax(0, 1fr);
  align-items: center;
  gap: 14px;
  padding: 4px 0;
}
.field { display: grid; gap: 8px; }
.field-inline { grid-column: 1 / -1; grid-template-columns: 150px minmax(0, 1fr); align-items: center; }
.field-inline span {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
}
.field-inline input,
.field-inline select {
  width: 100%;
  min-height: 48px;
  padding: 0 14px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  background: #fff;
  color: var(--text);
}
.field-inline input:focus,
.field-inline select:focus {
  outline: 3px solid rgba(46, 91, 154, 0.12);
  border-color: var(--primary);
}
.form-actions-inline {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  padding-top: 4px;
}
.inline-status { font-size: .95rem; }
.form-submit-row {
  display: flex;
  justify-content: center;
  padding-top: 6px;
}
.button-submit {
  min-width: 280px;
  min-height: 58px;
  font-size: 1.15rem;
}
.status-template-note,
.submit-hint { font-size: 0.92rem; line-height: 1.5; }
.admin-links {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  margin-top: 14px;
}
.admin-link-card {
  display: grid;
  gap: 6px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: var(--surface-soft);
}

.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 48px;
  padding: 0 18px;
  border: 1px solid transparent;
  border-radius: 12px;
  cursor: pointer;
}
.button-small { min-height: 42px; }
.button-primary {
  background: var(--primary);
  color: #fff;
  font-weight: 800;
}
.button-secondary {
  background: #fff;
  color: var(--primary);
  border-color: var(--line-strong);
  font-weight: 800;
}
.button-muted {
  background: var(--primary-soft);
  color: var(--primary-dark);
  border-color: var(--line);
  font-weight: 700;
}
.button-success {
  background: var(--green);
  color: #fff;
  font-weight: 800;
  box-shadow: 0 8px 20px rgba(34, 164, 105, 0.24);
}

@media (max-width: 860px) {
  .summary-strip,
  .driver-snapshot { grid-template-columns: 1fr 1fr; }
  .toolbar-row,
  .panel-row,
  .topbar,
  .driver-card-body,
  .driver-card-foot { grid-template-columns: 1fr; display: grid; }
  .topbar { align-items: start; }
  .toolbar-side { justify-content: start; }
  .driver-status-slot,
  .driver-action-slot { justify-self: start; }
  .driver-time-line { justify-content: start; }
}

@media (max-width: 640px) {
  .page-shell,
  .page-shell-wide,
  .page-shell-narrow {
    width: min(100% - 14px, 100%);
    padding-top: 10px;
    padding-bottom: 22px;
  }
  .topbar,
  .panel,
  .summary-tile,
  .driver-card-head,
  .driver-card-body,
  .driver-card-foot {
    padding-left: 14px;
    padding-right: 14px;
  }
  .summary-strip,
  .driver-snapshot,
  .admin-links { grid-template-columns: 1fr; }
  .topbar-links,
  .filter-bar,
  .toolbar-side,
  .form-actions-inline,
  .driver-card-body,
  .driver-card-foot { gap: 10px; }
  .topbar h1 { font-size: 2.2rem; }
  .toolbar-side,
  .filter-bar { display: grid; }
  .button,
  .button-submit,
  .driver-call-button,
  .filter-button {
    width: 100%;
    min-width: 0;
  }
  .driver-form-compact .form-row,
  .field-inline {
    grid-template-columns: 1fr;
    gap: 8px;
  }
  .driver-name { font-size: 1.45rem; }
  .driver-card-body { display: grid; grid-template-columns: 1fr; align-items: start; }
}
</style></head><body><div class="page-shell page-shell-narrow"><header class="topbar"><div><h1>Управление статусом</h1><p class="hero-subtitle">Личная ссылка водителя</p></div><nav class="topbar-links"><a href="#">Клиентская страница</a></nav></header><main class="page-main page-main-compact"><section class="panel panel-form"><form class="driver-form driver-form-compact"><div class="form-row"><label class="field field-inline"><span>Водитель</span><select><option>Водитель 3 — Мурат Рахимов</option></select></label></div><div class="form-row"><label class="field field-inline"><span>Статус</span><select><option>Не в сети</option></select></label></div><div class="form-row"><label class="field field-inline"><span>Шаблон места</span><select><option>Свой текст</option></select></label></div><div class="form-row"><label class="field field-inline field-grow"><span>Местоположение</span><input value="Не отвечает"></label></div><div class="form-actions-inline"><button class="button button-muted button-small" type="button">Получить геопозицию</button><p class="muted inline-status">Координаты не выбраны.</p></div><div class="form-submit-row"><button class="button button-success button-submit" type="button">Обновить</button></div></form></section><section class="panel panel-tight"><h2 class="section-title">Текущие данные</h2><dl class="driver-snapshot"><div><dt>Статус</dt><dd>Не в сети</dd></div><div><dt>Местоположение</dt><dd>Не отвечает</dd></div><div><dt>Последнее обновление</dt><dd>31 мар, 17:35</dd></div></dl></section></main></div></body></html>
